<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Analytics · portman.ca</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#F3EFE7;--paper-2:#FAF7F0;--ink:#2A2724;--ink-soft:#5C574F;--ink-faint:#8A847A;
    --line:#DAD4C8;--accent:#B4502A;--accent-soft:#C9764F;
    --serif:"Fraunces",Georgia,serif;--sans:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1040px;margin:0 auto;padding:28px 24px 64px;}
  header.bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:28px;}
  .bar h1{font-family:var(--serif);font-weight:500;font-size:26px;}
  .bar h1 span{color:var(--accent);}
  .controls{display:flex;gap:8px;align-items:center;}
  .rng{display:flex;border:1px solid var(--line);border-radius:4px;overflow:hidden;}
  .rng button{background:var(--paper-2);border:none;font-family:var(--sans);font-size:13px;color:var(--ink-soft);padding:8px 14px;cursor:pointer;border-left:1px solid var(--line);}
  .rng button:first-child{border-left:none;}
  .rng button.active{background:var(--accent);color:var(--paper-2);}
  .refresh{background:none;border:1px solid var(--line);border-radius:4px;padding:8px 12px;font-size:13px;color:var(--ink-soft);cursor:pointer;}
  .refresh:hover{border-color:var(--ink-faint);}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px;}
  .card{background:var(--paper-2);border:1px solid var(--line);border-radius:8px;padding:16px 18px;}
  .card .label{font-size:12px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-faint);}
  .card .value{font-family:var(--serif);font-size:30px;font-weight:500;margin-top:6px;}

  .chart-wrap{background:var(--paper-2);border:1px solid var(--line);border-radius:8px;padding:18px;margin-bottom:28px;height:300px;position:relative;}

  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
  .panel{background:var(--paper-2);border:1px solid var(--line);border-radius:8px;padding:18px;}
  .panel h2{font-family:var(--serif);font-weight:500;font-size:17px;margin-bottom:12px;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  td{padding:7px 0;border-top:1px solid var(--line);color:var(--ink-soft);}
  tr:first-child td{border-top:none;}
  td.v{text-align:right;color:var(--ink);font-variant-numeric:tabular-nums;white-space:nowrap;}
  td.k{max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .muted{color:var(--ink-faint);font-size:14px;}

  .state{text-align:center;padding:60px 20px;color:var(--ink-soft);}
  .state h2{font-family:var(--serif);font-weight:500;font-size:20px;margin-bottom:10px;color:var(--ink);}
  .state code{background:var(--paper-2);border:1px solid var(--line);border-radius:4px;padding:1px 6px;font-size:13px;}
  .foot{margin-top:36px;font-size:12px;color:var(--ink-faint);}
  a{color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
  <header class="bar">
    <h1>portman.ca <span>· analytics</span></h1>
    <div class="controls">
      <div class="rng" id="rng">
        <button data-days="7">7d</button>
        <button data-days="28" class="active">28d</button>
        <button data-days="90">90d</button>
      </div>
      <button class="refresh" id="refresh">Refresh</button>
    </div>
  </header>

  <div id="content"><div class="state"><p>Loading…</p></div></div>

  <p class="foot">Data from Google Analytics 4 · figures reflect consented visitors · some metrics finalize over 24–48h.</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
  let days = 28, chart = null;
  const $ = (s) => document.querySelector(s);
  const content = $('#content');

  const fmt = (n) => Number(n).toLocaleString();
  const pct = (n) => (Number(n) * 100).toFixed(1) + '%';
  const dur = (s) => { s = Math.round(Number(s)); const m = Math.floor(s/60); return m + 'm ' + (s%60) + 's'; };
  const niceDate = (d) => d ? d.slice(4,6)+'/'+d.slice(6,8) : '';

  function rows(arr, keyFn, valFn) {
    if (!arr || !arr.length) return '<tr><td class="muted">No data yet</td></tr>';
    return arr.map(r => `<tr><td class="k">${keyFn(r)}</td><td class="v">${valFn(r)}</td></tr>`).join('');
  }
  const esc = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  function render(d) {
    content.innerHTML = `
      <div class="cards">
        <div class="card"><div class="label">Visitors</div><div class="value">${fmt(d.totals.visitors)}</div></div>
        <div class="card"><div class="label">Pageviews</div><div class="value">${fmt(d.totals.pageviews)}</div></div>
        <div class="card"><div class="label">Sessions</div><div class="value">${fmt(d.totals.sessions)}</div></div>
        <div class="card"><div class="label">Avg. session</div><div class="value">${dur(d.totals.avgSessionDuration)}</div></div>
        <div class="card"><div class="label">Engagement</div><div class="value">${pct(d.totals.engagementRate)}</div></div>
      </div>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
      <div class="grid2">
        <div class="panel"><h2>Top pages</h2><table>${rows(d.topPages, r=>esc(r.path), r=>fmt(r.views))}</table></div>
        <div class="panel"><h2>Sources</h2><table>${rows(d.sources, r=>esc(r.source||'(direct)'), r=>fmt(r.sessions))}</table></div>
        <div class="panel"><h2>Countries</h2><table>${rows(d.countries, r=>esc(r.country), r=>fmt(r.visitors))}</table></div>
        <div class="panel"><h2>Devices</h2><table>${rows(d.devices, r=>esc(r.category), r=>fmt(r.visitors))}</table></div>
      </div>`;

    const ctx = $('#chart');
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: d.timeseries.map(p => niceDate(p.date)),
        datasets: [
          { label:'Visitors', data:d.timeseries.map(p=>p.visitors), borderColor:'#B4502A', backgroundColor:'rgba(180,80,42,0.08)', fill:true, tension:0.3, pointRadius:0 },
          { label:'Pageviews', data:d.timeseries.map(p=>p.pageviews), borderColor:'#8A847A', backgroundColor:'transparent', tension:0.3, pointRadius:0 },
        ],
      },
      options: { responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ labels:{ color:'#5C574F', font:{ family:'Inter' } } } },
        scales:{ x:{ grid:{ display:false }, ticks:{ color:'#8A847A', maxTicksLimit:12 } },
                 y:{ grid:{ color:'#DAD4C8' }, ticks:{ color:'#8A847A', precision:0 }, beginAtZero:true } } },
    });
  }

  function showState(title, html) {
    content.innerHTML = `<div class="state"><h2>${title}</h2><div>${html}</div></div>`;
  }

  async function load() {
    content.innerHTML = '<div class="state"><p>Loading…</p></div>';
    try {
      const res = await fetch('/api/stats?days=' + days);
      if (res.status === 503) { showState('Not connected yet', 'Add the GA4 environment variables in Vercel (<code>GA_PROPERTY_ID</code>, <code>GA_SERVICE_ACCOUNT_KEY</code>) and redeploy.'); return; }
      if (!res.ok) { const e = await res.json().catch(()=>({})); showState('Could not load stats', '<span class="muted">'+esc(e.error||res.status)+'</span>'); return; }
      render(await res.json());
    } catch (e) {
      showState('Could not load stats', '<span class="muted">'+esc(e.message||e)+'</span>');
    }
  }

  $('#rng').addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return;
    days = parseInt(b.dataset.days, 10);
    document.querySelectorAll('#rng button').forEach(x => x.classList.toggle('active', x === b));
    load();
  });
  $('#refresh').addEventListener('click', load);
  load();
</script>
</body>
</html>
