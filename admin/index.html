<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Analytics · portman.ca</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#F3EFE7;--paper-2:#FAF7F0;--ink:#2A2724;--ink-soft:#5C574F;--ink-faint:#8A847A;
    --line:#DAD4C8;--accent:#B4502A;
    --serif:"Fraunces",Georgia,serif;--sans:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);display:flex;flex-direction:column;min-height:100vh;-webkit-font-smoothing:antialiased;}
  header.bar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:14px 24px;border-bottom:1px solid var(--line);background:var(--paper-2);flex:none;}
  .bar h1{font-family:var(--serif);font-weight:500;font-size:20px;}
  .bar h1 span{color:var(--accent);}
  .bar a{font-size:13px;color:var(--ink-soft);text-decoration:none;letter-spacing:0.04em;}
  .bar a:hover{color:var(--accent);}
  .frame-wrap{flex:1;min-height:0;}
  iframe{width:100%;height:100%;border:0;display:block;}
  .setup{max-width:620px;margin:48px auto;padding:0 24px;color:var(--ink-soft);line-height:1.6;}
  .setup h2{font-family:var(--serif);font-weight:500;font-size:22px;color:var(--ink);margin-bottom:12px;}
  .setup code{background:var(--paper-2);border:1px solid var(--line);border-radius:4px;padding:1px 6px;font-size:13px;}
</style>
</head>
<body>
  <header class="bar">
    <h1>portman.ca <span>· analytics</span></h1>
    <a href="/">← back to site</a>
  </header>
  <div class="frame-wrap" id="frame-wrap">
    <iframe id="report" title="portman.ca analytics report"
      src="https://lookerstudio.google.com/embed/reporting/3ad3a4e0-932b-4bdd-b31f-ee52b70feece/page/PxI2F"
      sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
      allow="fullscreen"></iframe>
  </div>
  <script>
    (function(){
      var f = document.getElementById('report');
      if (!f || f.getAttribute('src').indexOf('REPLACE_WITH') !== -1) {
        document.getElementById('frame-wrap').innerHTML =
          '<div class="setup"><h2>Dashboard not connected yet</h2>' +
          '<p>The Looker Studio report URL hasn’t been added. Once the report is created and embedding is enabled, the embed link goes in <code>admin/index.html</code> and this page shows your live GA4 dashboard.</p></div>';
      }
    })();
  </script>
</body>
</html>
